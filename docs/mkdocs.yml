site_name: "Trace-First Workflow"
site_description: "A structured methodology where products preserve knowledge about themselves — purpose, decisions, history, and meaning."
site_url: "https://tfw.saubakirov.kz/"
repo_url: "https://github.com/saubakirov/trace-first-starter"
docs_dir: .
site_dir: ../site

theme:
  name: material
  custom_dir: overrides
  logo: brand/logo_header.png
  favicon: brand/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_docs.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - overrides/stylesheets/extra.css

